# Authoritative Netlify config (overrides confusing UI fields).
# Deploys ONLY the static download site — never installs root package.json / Playwright.

[build]
  # Run the "build" from the website folder (no package.json here → no npm install)
  base = "website"
  # Publish the website folder itself (relative to base)
  publish = "."
  command = "echo Static website - no build"

[build.environment]
  NODE_VERSION = "20"
  # Extra safety: never run npm/yarn/pnpm install for this site
  NETLIFY_SKIP_NPM = "true"

[[headers]]
  for = "/downloads/*"
  [headers.values]
    Content-Disposition = "attachment"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
