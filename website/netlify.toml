# Used when Netlify "Base directory" is set to `website` in the UI.
# Prefer the root netlify.toml (base = "website") so deploys never touch the app package.json.

[build]
  publish = "."
  command = "echo Static website — no build step"

[[headers]]
  for = "/downloads/*"
  [headers.values]
    Content-Disposition = "attachment"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
